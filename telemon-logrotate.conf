# Log rotation for Telemon - installed by install.sh
# Uses TELEMON_DIR from environment or defaults to script location
${TELEMON_DIR}/telemon.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    su root root
}

${TELEMON_DIR}/telemon_cron.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    su root root
}
